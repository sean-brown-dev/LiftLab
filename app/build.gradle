plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    id 'kotlin-kapt'
    id 'com.google.devtools.ksp'
    id 'org.jetbrains.kotlin.plugin.serialization'
    id 'org.jetbrains.kotlin.plugin.compose'
    id 'com.google.gms.google-services'
    id 'com.google.firebase.crashlytics'
}

android {
    namespace = 'com.browntowndev.liftlab'
    compileSdk = 36

    defaultConfig {
        applicationId = "com.browntowndev.liftlab"
        minSdk = 29
        targetSdk = 36
        versionCode = 26
        versionName = "1.25"

        testInstrumentationRunner = "androidx.test.runner.AndroidJUnitRunner"
        vectorDrawables {
            useSupportLibrary = true
        }

        ksp {
            arg("room.schemaLocation", "$projectDir/schemas")
        }
    }
    signingConfigs {
        release {
            storeFile file(RELEASE_KEYSTORE_FILE)
            storePassword RELEASE_KEYSTORE_PASSWORD
            keyAlias RELEASE_KEY_ALIAS
            keyPassword RELEASE_KEY_ALIAS_PASSWORD
        }
    }

    buildTypes {
        release {
            minifyEnabled = true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig = signingConfigs.release
            buildConfigField("boolean", "LOCAL_DEV_BUILD", "true")
            buildConfigField("boolean", "USE_SCRATCH_DB", "false")
        }

        debug {
            buildConfigField("boolean", "LOCAL_DEV_BUILD", "true")
            buildConfigField("boolean", "USE_SCRATCH_DB", "true")
        }
    }
    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_21
        targetCompatibility = JavaVersion.VERSION_21
    }
    buildFeatures {
        compose = true
        buildConfig = true
    }
    packagingOptions {
        resources {
            excludes += '/META-INF/{AL2.0,LGPL2.1}'
        }
    }
    testOptions {
        unitTests {
            // return default values for any un‑mocked android.* calls
            returnDefaultValues = true

            // configure *all* Test tasks for unit tests
            all { Test testTask ->
                // add the dynamic‑agent flag (hides that Byte‑Buddy warning)
                testTask.jvmArgs += '-XX:+EnableDynamicAgentLoading'
                // enable JUnit‑5 discovery
                testTask.useJUnitPlatform()
            }
        }
    }
}

dependencies {
    // =================== MODULE PROJECTS ======================
    implementation(project(":annotations"))
    ksp(project(":annotation_generator"))

    // =================== KSP ======================
    implementation "com.google.devtools.ksp:symbol-processing-api:2.2.0-2.0.2"

    // =================== ANDROIDX CORE & ACTIVITY ======================
    def activity_version = '1.9.3'
    implementation "androidx.activity:activity-ktx:$activity_version"
    implementation 'androidx.core:core-ktx:1.16.0'
    implementation 'androidx.core:core-splashscreen:1.0.1'

    // =================== KOTLIN ======================
    def kotlin_coroutines_version = '1.10.2'
    implementation "org.jetbrains.kotlin:kotlin-reflect:2.1.20"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-core:$kotlin_coroutines_version"
    implementation 'org.jetbrains.kotlinx:kotlinx-serialization-json:1.9.0'

    // =================== FIREBASE (BOM Managed) & GOOGLE SERVICES ======================
    def feature_delivery_version = '2.1.0'
    implementation platform('com.google.firebase:firebase-bom:33.16.0')
    implementation "com.google.firebase:firebase-appcheck-playintegrity"
    implementation "com.google.firebase:firebase-auth-ktx"
    implementation "com.google.firebase:firebase-firestore"
    implementation "com.google.firebase:firebase-crashlytics"
    implementation "com.google.firebase:firebase-ai"
    implementation "com.google.firebase:firebase-appcheck-debug"
    implementation "com.google.android.play:feature-delivery:$feature_delivery_version"
    implementation "com.google.android.play:feature-delivery-ktx:$feature_delivery_version"
    implementation "com.android.billingclient:billing-ktx:8.0.0"
    implementation 'com.google.guava:guava:33.4.8-jre'
    implementation 'androidx.security:security-crypto-ktx:1.1.0-beta01'

    // ---- Firebase Auth helpers ----
    def firebase_auth_helper_version = '2.4.0-alpha02'
    implementation("io.github.mirzemehdi:kmpauth-google:$firebase_auth_helper_version")
    implementation("io.github.mirzemehdi:kmpauth-firebase:$firebase_auth_helper_version")
    implementation("io.github.mirzemehdi:kmpauth-uihelper:$firebase_auth_helper_version")

    // =================== EVENTBUS ======================
    def eventbus_version = '3.3.1'
    implementation "org.greenrobot:eventbus:$eventbus_version"
    ksp "org.greenrobot:eventbus-annotation-processor:$eventbus_version"

    // =================== ANNOTATIONS ======================
    implementation "javax.annotation:javax.annotation-api:1.3.2"
    implementation 'com.google.j2objc:j2objc-annotations:3.0.0'

    // =================== COMPOSE (BOM Managed) ======================
    implementation platform('androidx.compose:compose-bom:2025.07.00')
    implementation "androidx.activity:activity-compose:1.10.1"
    implementation "androidx.compose.ui:ui"
    implementation "androidx.compose.ui:ui-graphics"
    implementation "androidx.compose.ui:ui-tooling-preview"
    implementation "androidx.compose.foundation:foundation"
    implementation 'androidx.compose.runtime:runtime-livedata:1.8.3'
    implementation "androidx.compose.ui:ui-util"
    implementation "androidx.compose.material:material"
    implementation "androidx.compose.material3:material3"

    // =================== NAVIGATION ======================
    def nav_version = '2.9.2'
    implementation "androidx.navigation:navigation-fragment-ktx:$nav_version"
    implementation "androidx.navigation:navigation-ui-ktx:$nav_version"
    implementation "androidx.navigation:navigation-dynamic-features-fragment:$nav_version"
    implementation "androidx.navigation:navigation-compose:$nav_version"
    androidTestImplementation "androidx.navigation:navigation-testing:$nav_version"

    // =================== ROOM ======================
    def room_version = '2.7.2'
    implementation "androidx.room:room-ktx:$room_version"
    implementation "androidx.room:room-runtime:$room_version"
    implementation "androidx.room:room-common:$room_version"
    ksp "androidx.room:room-compiler:$room_version"

    // =================== LIFECYCLE ======================
    def lifecycle_version = '2.9.2'
    implementation "androidx.lifecycle:lifecycle-viewmodel-compose:$lifecycle_version"
    implementation "androidx.lifecycle:lifecycle-runtime-ktx:$lifecycle_version"
    implementation "androidx.lifecycle:lifecycle-livedata-ktx:$lifecycle_version"

    // =================== WORK ======================
    def work_version = '2.10.2'
    implementation "androidx.work:work-runtime-ktx:$work_version"
    implementation "androidx.work:work-runtime:$work_version"

    // =================== KOIN ======================
    def koin_version = '4.1.0'
    implementation "io.insert-koin:koin-core:$koin_version"
    implementation "io.insert-koin:koin-android:$koin_version"
    implementation "io.insert-koin:koin-androidx-compose:$koin_version"
    implementation("io.insert-koin:koin-androidx-workmanager:$koin_version")

    // =================== THIRD PARTY UI ======================
    implementation 'sh.calvin.reorderable:reorderable:2.5.1'
    implementation 'com.valentinilk.shimmer:compose-shimmer:1.3.3'
    implementation 'dev.shreyaspatil:capturable:3.0.1'

    // =================== VICO CHARTS ======================
    def vico_version = '2.1.3'
    implementation("com.patrykandpatrick.vico:compose:$vico_version")
    implementation("com.patrykandpatrick.vico:compose-m3:$vico_version")
    implementation("com.patrykandpatrick.vico:core:$vico_version")
    implementation("com.patrykandpatrick.vico:views:$vico_version")

    // =================== ARROW ======================
    def arrow_version = '2.1.2'
    implementation "io.arrow-kt:arrow-core:$arrow_version"
    implementation "io.arrow-kt:arrow-fx-coroutines:$arrow_version"

    // =================== GSON ======================
    implementation 'com.google.code.gson:gson:2.13.1'

    // =================== TESTING (UNIT/INSTRUMENTATION) ======================
    // JUnit 5 (BOM Managed)
    def junit_jupiter_version = '5.13.3'
    testImplementation platform("org.junit:junit-bom:$junit_jupiter_version")
    testImplementation "org.junit.jupiter:junit-jupiter"
    testImplementation "org.junit.jupiter:junit-jupiter-params"
    testRuntimeOnly "org.junit.jupiter:junit-jupiter-engine"
    testRuntimeOnly "org.junit.platform:junit-platform-launcher"

    // --- To run old JUnit 4 tests temporarily, uncomment below: ---
    // testImplementation 'junit:junit:4.13.2'
    // testRuntimeOnly 'org.junit.vintage:junit-vintage-engine'

    // Kotlin & coroutine test helpers
    testImplementation "io.mockk:mockk:1.14.5"
    testImplementation "org.jetbrains.kotlinx:kotlinx-coroutines-test:$kotlin_coroutines_version"
    testImplementation "androidx.arch.core:core-testing:2.2.0"
    testImplementation("org.jetbrains.kotlin:kotlin-test:1.9.23") // Use for kotlin assertions, fine w/ JUnit5

    // AndroidX Instrumentation/Compose Test
    androidTestImplementation 'androidx.test.ext:junit:1.2.1'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.6.1'
    androidTestImplementation platform('androidx.compose:compose-bom:2025.07.00')
    androidTestImplementation 'androidx.compose.ui:ui-test-junit4:1.8.3'

    // Compose debug/test utilities (BOM Managed)
    debugImplementation 'androidx.compose.ui:ui-tooling'
    debugImplementation 'androidx.compose.ui:ui-test-manifest'
}

ksp {
    arg("room.generateKotlin", "true")
    arg('eventBusIndex', 'com.com.browntowndev.liftlab.EventBusIndex')
}
