plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    id 'kotlin-kapt'
    id 'com.google.devtools.ksp'
    id 'org.jetbrains.kotlin.plugin.serialization'
    id 'org.jetbrains.kotlin.plugin.compose'
    id 'com.google.gms.google-services'
    id 'com.google.firebase.crashlytics'
    id 'tech.apter.junit5.jupiter.robolectric-extension-gradle-plugin'
    id 'jacoco'
    id "de.mannodermaus.android-junit5"
}
jacoco {
    toolVersion = "0.8.11"
}
android {
    namespace = 'com.browntowndev.liftlab'
    compileSdk = 36

    defaultConfig {
        applicationId = "com.browntowndev.liftlab"
        minSdk = 34
        targetSdk = 36
        versionCode = 26
        versionName = "1.25"

        testInstrumentationRunner = "androidx.test.runner.AndroidJUnitRunner"
        vectorDrawables {
            useSupportLibrary = true
        }

        ksp {
            arg("room.schemaLocation", "$projectDir/schemas")
        }
    }
    signingConfigs {
        release {
            storeFile file(findProperty("RELEASE_KEYSTORE_FILE") ?: "debug.keystore")
            storePassword findProperty("RELEASE_KEYSTORE_PASSWORD") ?: "android"
            keyAlias findProperty("RELEASE_KEY_ALIAS") ?: "androiddebugkey"
            keyPassword findProperty("RELEASE_KEY_ALIAS_PASSWORD") ?: "android"
        }
        debug {
            storeFile file(findProperty("RELEASE_KEYSTORE_FILE") ?: "debug.keystore")
            storePassword findProperty("RELEASE_KEYSTORE_PASSWORD") ?: "android"
            keyAlias findProperty("RELEASE_KEY_ALIAS") ?: "androiddebugkey"
            keyPassword findProperty("RELEASE_KEY_ALIAS_PASSWORD") ?: "android"
        }
    }

    buildTypes {
        release {
            minifyEnabled = true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig = signingConfigs.release
            buildConfigField("boolean", "LOCAL_DEV_BUILD", "true")
            buildConfigField("boolean", "USE_SCRATCH_DB", "false")
        }

        debug {
            signingConfig = signingConfigs.debug
            buildConfigField("boolean", "LOCAL_DEV_BUILD", "true")
            buildConfigField("boolean", "USE_SCRATCH_DB", "true")
        }
    }
    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_21
        targetCompatibility = JavaVersion.VERSION_21
    }
    buildFeatures {
        compose = true
        buildConfig = true
    }
    packagingOptions {
        resources {
            excludes += '/META-INF/{AL2.0,LGPL2.1}'
        }
    }
    defaultConfig {
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        testInstrumentationRunnerArguments runnerBuilder: "de.mannodermaus.junit5.AndroidJUnit5Builder"
    }
    testOptions {
        unitTests {
            // return default values for any un‑mocked android.* calls
            returnDefaultValues = true
            includeAndroidResources= true

            // configure *all* Test tasks for unit tests
            all { Test testTask ->

                // Disable default Jacoco instrumentation; the Robolectric plugin handles it.
                testTask.jacoco.enabled = false
                // --------------------

                // add the dynamic‑agent flag (hides that Byte‑Buddy warning)
                testTask.jvmArgs += '-XX:+EnableDynamicAgentLoading'
                // enable JUnit‑5 discovery
                testTask.useJUnitPlatform()

                // Use jacaco for coverage so it works with Robolectric
                jacoco.includeNoLocationClasses = true
                jacoco.excludes = ['jdk.internal.*']
            }
        }
    }
}
dependencies {
    // =================== MODULE PROJECTS ======================
    implementation(project(":annotations"))
    ksp(project(":annotation_generator"))

    // =================== KSP ======================
    implementation libs.ksp.api

    // =================== ANDROIDX CORE & ACTIVITY ======================
    implementation libs.androidx.activity.ktx
    implementation libs.androidx.core.ktx
    implementation libs.androidx.core.splashscreen

    // =================== KOTLIN ======================
    implementation libs.kotlin.reflect
    implementation libs.kotlinx.coroutines.core
    implementation libs.kotlinx.serialization.json

    // =================== FIREBASE (BOM Managed) & GOOGLE SERVICES ======================
    implementation platform(libs.firebase.bom)
    implementation libs.firebase.appcheck.playintegrity
    implementation libs.firebase.auth
    implementation libs.firebase.firestore
    implementation libs.firebase.crashlytics
    implementation libs.firebase.ai
    implementation libs.firebase.appcheck.debug
    implementation libs.play.feature.delivery
    implementation libs.play.feature.delivery.ktx
    implementation libs.billing.ktx
    implementation libs.guava
    implementation libs.androidx.security.crypto.ktx

    // ---- Firebase Auth helpers ----
    implementation libs.kmpauth.google
    implementation libs.kmpauth.firebase
    implementation libs.kmpauth.uihelper

    // =================== EVENTBUS ======================
    implementation libs.eventbus
    ksp libs.eventbus.compiler

    // =================== ANNOTATIONS ======================
    implementation libs.javax.annotation.api
    implementation libs.j2objc.annotations

    // =================== COMPOSE (BOM Managed) ======================
    implementation platform(libs.compose.bom)
    implementation libs.androidx.activity.compose
    implementation libs.compose.ui
    implementation libs.compose.ui.graphics
    implementation libs.compose.ui.tooling.preview
    implementation libs.compose.foundation
    implementation libs.compose.ui.util
    implementation libs.compose.material
    implementation libs.compose.material3
    implementation libs.compose.material.icons.extended

    // =================== NAVIGATION ======================
    implementation libs.navigation.fragment.ktx
    implementation libs.navigation.ui.ktx
    implementation libs.navigation.dynamic.features.fragment
    implementation libs.navigation.compose
    androidTestImplementation libs.navigation.testing

    // =================== ROOM ======================
    implementation libs.room.ktx
    implementation libs.room.runtime
    implementation libs.room.common
    ksp libs.room.compiler

    // =================== LIFECYCLE ======================
    implementation libs.lifecycle.viewmodel.compose
    implementation libs.lifecycle.runtime.ktx
    implementation libs.lifecycle.livedata.ktx
    implementation libs.lifecycle.process

    // =================== WORK ======================
    implementation libs.work.runtime.ktx
    implementation libs.work.runtime

    // =================== KOIN ======================
    implementation libs.koin.core
    implementation libs.koin.android
    implementation libs.koin.androidx.compose
    implementation libs.koin.androidx.workmanager

    // =================== THIRD PARTY UI ======================
    implementation libs.reorderable
    implementation libs.compose.shimmer
    implementation libs.capturable

    // =================== VICO CHARTS ======================
    implementation libs.vico.compose
    implementation libs.vico.compose.m3
    implementation libs.vico.core
    implementation libs.vico.views

    // =================== ARROW ======================
    implementation libs.arrow.core
    implementation libs.arrow.fx.coroutines

    // =================== GSON ======================
    implementation libs.gson

    // =================== TESTING (UNIT/INSTRUMENTATION) ======================
    // JUnit 5 (BOM Managed)
    testImplementation platform(libs.junit.bom)
    testImplementation libs.junit.jupiter
    testImplementation libs.junit.jupiter.params
    testRuntimeOnly libs.junit.jupiter.engine
    testRuntimeOnly libs.junit.platform.launcher
    testImplementation libs.turbine
    testImplementation libs.robolectric
    testImplementation libs.androidx.test.core // ApplicationProvider

    // JUnit 5 for instrumented tests
    androidTestImplementation platform(libs.junit.bom)
    androidTestImplementation libs.junit.jupiter.api
    androidTestRuntimeOnly libs.junit.jupiter.engine

    // AndroidX instrumentation helpers
    androidTestImplementation libs.androidx.test.core.ktx
    androidTestImplementation libs.androidx.test.runner
    androidTestImplementation libs.androidx.test.ext.junit.ktx // keep if you also run JUnit4-based instrumented tests (e.g., Compose ui-test-junit4)

    // Room testing (optional but handy for migrations)
    androidTestImplementation libs.room.testing

    // Coroutines testing on device
    androidTestImplementation libs.kotlinx.coroutines.test

    // --- To run old JUnit 4 tests temporarily, uncomment below: ---
    // testImplementation 'junit:junit:4.13.2'
    // testRuntimeOnly 'org.junit.vintage:junit-vintage-engine'

    // Kotlin & coroutine test helpers
    testImplementation libs.mockk
    testImplementation libs.kotlinx.coroutines.test
    testImplementation libs.arch.core.testing
    testImplementation libs.kotlin.test // Use for kotlin assertions, fine w/ JUnit5

    // AndroidX Instrumentation/Compose Test
    androidTestImplementation libs.androidx.test.ext.junit
    androidTestImplementation libs.espresso.core
    androidTestImplementation platform(libs.compose.bom)
    androidTestImplementation libs.compose.ui.test.junit4

    // Compose debug/test utilities (BOM Managed)
    debugImplementation libs.compose.ui.tooling
    debugImplementation libs.compose.ui.test.manifest
}

ksp {
    arg("room.generateKotlin", "true")
    arg('eventBusIndex', 'com.com.browntowndev.liftlab.EventBusIndex')
}
